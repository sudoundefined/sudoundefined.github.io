<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepanshu Srivastava Resume</title>
  <script>
    // GitHub Pages SPA redirect:
    // When GitHub Pages serves this 404.html for an unknown path,
    // redirect to index.html while preserving the original path
    // so the React app can handle it client-side.
    var pathSegmentsToKeep = 0; // Set to 1 if deployed under a repo subpath (e.g., /repo-name/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>

<body>
</body>

</html>
